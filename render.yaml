services:
  - type: web
    name: fraudshield-api
    runtime: python
    buildCommand: bash build.sh
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: fraud-data
      mountPath: /opt/render/project/src
      sizeGB: 1
